[project]
name = "psc"
description = "Personal scripts collection"
version = "0.0dev0"
authors = [
    {name = "Wibowo Arindrarto", email = "contact@arindrarto.dev"},
]
requires-python = "==3.14.*"
dependencies = [
    "cyclopts",
    "pygraphviz",
]

[project.scripts]
psc = "psc:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/psc"]
